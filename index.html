<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کاوشگر هوشمند متابولیسم</title>
    <script type="text/javascript" src="https://reactome.org/DiagramJs/diagram/diagram.nocache.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f4f9; padding: 20px; }
        .viewer-container { width: 90%; height: 60vh; border: 2px solid #ddd; margin: 20px auto; background: white; }
        .ai-area { width: 90%; margin: 20px auto; padding: 20px; background: #fff; border-radius: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="diagramHolder" class="viewer-container"></div>

<div class="ai-area">
    <button onclick="askAI()">🤖 تحلیل هوشمند مسیر</button>
    <div id="aiContent" style="margin-top: 15px; line-height: 1.6;">پاسخ پس از تحلیل نمایش داده می‌شود.</div>
</div>

<script>
    const pathwayData = { 'glycolysis': { reactome: 'R-HSA-70171', name: 'گلیکولیز' } };
    let currentPathKey = 'glycolysis';
    let diagramViewer;

    // بارگذاری نمودار ری‌اکتوم
    diagramViewer = Reactome.Diagram.create({"placeHolder": "diagramHolder", "width": 800, "height": 400});
    diagramViewer.loadDiagram(pathwayData[currentPathKey].reactome);

    async function askAI() {
        const content = document.getElementById('aiContent');
        content.innerText = "در حال پردازش توسط هوش مصنوعی...";

        try {
            // این آدرس به سمت سرور ورسل شما می‌رود
            const res = await fetch('/api/chat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: `توضیح آکادمیک مسیر ${pathwayData[currentPathKey].name}` })
            });
            const data = await res.json();
            content.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            content.innerText = "خطا در ارتباط با سرور هوش مصنوعی.";
        }
    }
</script>
</body>
</html>
